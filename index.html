<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Аналитика Ozon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif;background:#f5f5f7;color:#1d1d1f;-webkit-font-smoothing:antialiased;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.container{text-align:center;max-width:600px}
h1{font-size:48px;font-weight:700;letter-spacing:-1px;margin-bottom:8px}
p{font-size:18px;color:#86868b;margin-bottom:40px;line-height:1.5}
.links{display:flex;flex-direction:column;gap:16px;align-items:center}
.links a{display:inline-flex;align-items:center;gap:10px;padding:16px 32px;border-radius:14px;font-size:17px;font-weight:500;text-decoration:none;transition:all .3s ease;min-width:280px;justify-content:center}
a.dashboard{background:#0071e3;color:#fff;box-shadow:0 4px 16px rgba(0,113,227,.3)}
a.dashboard:hover{background:#0077ed;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,113,227,.4)}
a.dashboard svg{width:20px;height:20px;fill:currentColor}
footer{margin-top:60px;font-size:13px;color:#86868b}
</style>
</head>
<body>
<div class="container">
  <h1>Аналитика Ozon</h1>
  <p>Дашборд по рынку кофе на Ozon</p>
  <div class="links">
    <a class="dashboard" href="dashboard.html">
      <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
      Открыть дашборд
    </a>
  </div>
  <footer>На основе данных Ozon</footer>
</div>
</body>
</html>
